<!-- ──────────────────────────────────────────────────────────────
     BLOCK 3 — FAQ (place on FAQ page / homepage FAQ section)
     ────────────────────────────────────────────────────────────── -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What is the Finbrella Financial Wellness Report?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The Finbrella Financial Wellness Report is a personalized, year-wise roadmap that documents all your life goals and financial dreams — from buying a home and funding your child's education to retiring comfortably. It includes a clear strategy, recommended investment amounts per goal, the right financial instruments, and milestones for every year until you achieve each goal."
      }
    },
    {
      "@type": "Question",
      "name": "How is Finbrella different from apps like Groww, Kuvera, or Scripbox?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Groww, Kuvera, and Scripbox are primarily investment execution platforms for mutual funds, SIPs, and stocks. Finbrella goes a step further by providing comprehensive life financial planning: it does not just invest your money, it maps every rupee to a specific life goal, builds an insurance and income protection plan, calculates the exact SWP strategy for post-retirement income, and assigns a human advisor who reviews and updates your plan over time. Finbrella also covers estate planning and wealth distribution — areas not covered by self-service investment apps."
      }
    },
    {
      "@type": "Question",
      "name": "What is goal-based financial planning and why does it matter?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Goal-based financial planning means every investment decision is tied to a specific life goal — whether that is buying a house in 5 years, funding higher education in 12 years, or building a retirement corpus by age 60. Unlike generic saving or investing, goal-based planning accounts for inflation, time horizon, risk tolerance, and goal priority, ensuring that your money works efficiently and that you reach each milestone on time."
      }
    },
    {
      "@type": "Question",
      "name": "What is a Systematic Withdrawal Plan (SWP) and how does Finbrella use it?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A Systematic Withdrawal Plan (SWP) allows you to withdraw a fixed amount from your mutual fund portfolio at regular intervals, like a self-created pension. Finbrella uses SWP as part of its retirement and goal-exit strategy to ensure you draw down your wealth at the optimal time — minimizing tax, maximizing returns, and ensuring your corpus lasts as long as you need it."
      }
    },
    {
      "@type": "Question",
      "name": "How much does Finbrella's financial planning service cost?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Finbrella offers personalized counselling sessions and Financial Wellness Reports. Please contact Finbrella directly at https://www.finbrellafpd.com or through the FinPlan app at https://finbrella-finplan.vercel.app to get details on current service packages and pricing."
      }
    },
    {
      "@type": "Question",
      "name": "What is Pahela Kadam by Finbrella?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Pahela Kadam (First Step) is Finbrella's Investor Awareness Programme designed for first-time investors and financially underserved communities. It provides education on income protection, basic investing principles, and the importance of starting early — bridging the gap in financial literacy across India."
      }
    },
    {
      "@type": "Question",
      "name": "Is Finbrella a SEBI-registered investment advisor?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Finbrella was founded by professionals with deep experience in SEBI-registered and regulated firms including Aditya Birla Capital and Pramerica Life Insurance. For the latest regulatory status and registrations, please visit https://www.finbrellafpd.com."
      }
    },
    {
      "@type": "Question",
      "name": "Can Finbrella help me with both insurance and investments in one plan?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Unlike pure investment apps that only recommend mutual funds or stocks, Finbrella's Financial Wellness Report integrates insurance planning (life, health, and term cover), investment diversification (equity, debt, SIP, gold, FD), and withdrawal planning into a single coordinated strategy. This ensures there are no gaps in your financial protection at any life stage."
      }
    }
  ]
}
</script>
