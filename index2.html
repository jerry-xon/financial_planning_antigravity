<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net Worth Analysis Mockup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* FinPlan Palette */
            --color-1: #172D9D; /* Deep Navy */
            --color-2: #00A9F2; /* Sky Blue */
            --color-3: #787CFE; /* Soft Purple */
            --color-4: #48BED9; /* Aqua */
            --color-5: #00E2E0; /* Cyan */
            
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;

            --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 10px 30px rgba(0, 0, 0, 0.08);
            
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 2rem;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--color-1);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
        }

        h1 span {
            font-weight: 400;
            color: var(--text-main);
            margin-left: 0.5rem;
        }

        .controls-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .select-pill {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            background: white;
            border: 1px solid var(--border);
            color: var(--text-main);
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        /* Top Hero Card */
        .hero-card {
            background: linear-gradient(135deg, white 0%, #e0f2fe 100%);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            box-shadow: var(--shadow-soft);
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.8);
        }

        /* Abstract mountain shape layer */
        .hero-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg"><path fill="%2300A9F2" opacity="0.15" d="M0,300 L0,200 L200,150 L400,220 L650,50 L850,180 L1000,100 L1000,300 Z"/></svg>') no-repeat bottom right;
            background-size: cover;
            pointer-events: none;
        }

        .hero-title {
            font-size: 1.1rem;
            color: var(--color-1);
            font-weight: 600;
            margin-bottom: 1rem;
            position: relative;
            z-index: 2;
        }

        .hero-amount {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 2;
        }

        .trend-badge {
            display: inline-flex;
            align-items: center;
            color: var(--color-2);
            font-size: 0.95rem;
            font-weight: 600;
            position: relative;
            z-index: 2;
        }

        /* Bottom Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .data-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.3s ease;
        }
        
        .data-card:hover {
            box-shadow: var(--shadow-hover);
        }

        .card-title {
            font-size: 1.15rem;
            color: var(--text-main);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .card-amount {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .card-trend {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-2);
            margin-bottom: 2rem;
        }

        .card-trend.down {
            color: var(--text-muted);
        }

        /* Donut Chart Simulation */
        .chart-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            align-items: center;
            flex: 1;
        }

        .donut-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto;
        }

        .donut {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                var(--color-3) 0deg 245deg, 
                var(--color-2) 245deg 320deg, 
                #fcd34d 320deg 360deg
            );
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .donut-hole {
            width: 65%;
            height: 65%;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--color-1);
        }

        /* Legend */
        .legend-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-main);
            font-weight: 500;
        }

        .legend-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        /* Area Chart Simulation */
        .area-wrapper {
            margin-top: 1rem;
            height: 100px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 400 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path fill="%23eff6ff" stroke="%2300A9F2" stroke-width="2" d="M0,80 Q50,40 100,50 T200,60 T300,30 T400,10 L400,100 L0,100 Z"/></svg>') no-repeat;
            background-size: 100% 100%;
            margin-bottom: 2rem;
            position: relative;
        }
        
        .area-line-marker {
            position: absolute;
            right: 0;
            top: 0;
            font-size: 1rem;
            font-weight: bold;
            color: var(--text-main);
            background: rgba(255,255,255,0.8);
            padding: 2px 8px;
            border-radius: 12px;
        }

        .view-details {
            border: 1px solid var(--border);
            background: transparent;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--color-1);
            cursor: pointer;
            text-align: center;
            display: inline-block;
            margin-top: 1rem;
            align-self: center;
        }

    </style>
</head>
<body>

    <div style="max-width: 1000px; margin: 0 auto;">
        
        <h1>Net Worth <span>Analysis</span></h1>
        
        <div class="controls-row">
            <div class="select-pill">Overall <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></div>
            <div class="select-pill">June 2025 <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></div>
        </div>

        <div class="hero-card">
            <div class="hero-title">Total Net Worth</div>
            <div class="hero-amount">₹ 18,50,000</div>
            <div class="trend-badge">↑ 5.4% vs May 2025</div>
        </div>

        <div class="dashboard-grid">
            
            <!-- Assets Card -->
            <div class="data-card">
                <div class="card-title">Assets</div>
                <div class="card-amount">₹ 25,00,000</div>
                <div class="card-trend">↑ 68% <svg style="margin-left:4px" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></div>
                
                <div class="chart-layout">
                    <div class="legend-list">
                        <div class="legend-item">
                            <div class="legend-label"><div class="dot" style="background: var(--color-3);"></div> Equity</div>
                            <span class="text-muted">₹ 14.5L</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-label"><div class="dot" style="background: var(--color-2);"></div> Debt</div>
                            <span class="text-muted">₹ 6.2L</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-label"><div class="dot" style="background: #fcd34d;"></div> Gold</div>
                            <span class="text-muted">₹ 2.5L</span>
                        </div>
                    </div>
                    
                    <div class="donut-container">
                        <div class="donut">
                            <div class="donut-hole">68%</div>
                        </div>
                    </div>
                </div>
                
                <button class="view-details" style="margin-top: 1.5rem;">View Details →</button>
            </div>

            <!-- Liabilities Card -->
            <div class="data-card">
                <div class="card-title">Liabilities</div>
                <div class="card-amount">₹ 6,50,000</div>
                <div class="card-trend down">↓ 32%</div>
                
                <div class="area-wrapper">
                    <div class="area-line-marker">32%</div>
                </div>

                <div class="legend-list">
                    <div class="legend-item">
                        <div class="legend-label"><div class="dot" style="background: var(--color-1);"></div> Equity</div>
                        <span class="text-muted">₹ 14.5L</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-label"><div class="dot" style="background: var(--color-4);"></div> Debt</div>
                        <span class="text-muted">₹ 6.2L</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-label"><div class="dot" style="background: var(--color-3);"></div> Gold</div>
                        <span class="text-muted">₹ 2.5L</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-label"><div class="dot" style="background: var(--color-2);"></div> Cash</div>
                        <span class="text-muted">₹ 1.8L</span>
                    </div>
                </div>
            </div>
            
        </div>

    </div>

</body>
</html>
