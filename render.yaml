# Render Blueprint — deploys the @finplan/api Fastify server.
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this branch to GitHub.
#   2. In Render: New + → Blueprint → pick this repo.
#   3. Render reads this file and provisions the service.
#   4. After the first deploy, copy the service URL (https://<name>.onrender.com)
#      and set it as VITE_API_URL in Vercel for the web app, plus add the
#      Vercel URL to CORS_ORIGIN below.
#
# Notes on the free plan:
#   - The free Web Service sleeps after ~15 min of inactivity and cold-starts
#     on the next request. That is fine for low-traffic apps; consider upgrading
#     to "Starter" if cold starts are an issue.
#   - Free services do not get a custom domain by default; use the assigned
#     onrender.com subdomain.

services:
  - type: web
    name: finplan-api
    runtime: node
    plan: free
    region: singapore
    branch: main
    rootDir: .
    # The API is plain ESM JS — no build step beyond installing dependencies.
    buildCommand: npm ci
    startCommand: node apps/api/src/server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "8080"
      - key: HOST
        value: 0.0.0.0
      # Comma-separated list of origins allowed to call this API.
      # After you deploy the frontend to Vercel, update this to include the
      # Vercel production URL (and any preview/branch URLs you want to allow).
      - key: CORS_ORIGIN
        value: http://localhost:5173,https://your-app.vercel.app
